<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Adoção</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <form>

    <h2>Formulário de adoção</h2>
    <p>Preencha as informações abaixo</p>

    <input type="text" id="nome" placeholder="Digite seu nome">
    <br><br>

    <input type="email" id="email" placeholder="Email" required>
    <br><br>

    <input type="text" id="telefone" placeholder="Telefone" maxlength="11" required>
    <br><br>

    <input type="text" id="cpf" placeholder="CPF" maxlength="11" required>
    <br><br>

    <input type="number" id="idade" placeholder="Idade" required>
    <br><br>

    <input type="text" id="cidade" placeholder="Cidade" required>
    <br><br>

    <select id="moradia" required>
      <option value="">Tipo de moradia</option>
      <option value="casa">Casa</option>
      <option value="apartamento">Apartamento</option>
    </select>
    <br><br>

    <select id="quintal" required>
      <option value="">Possui quintal?</option>
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>
    <br><br>

    <select id="pet" required>
      <option value="">Já teve pet?</option>
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>
    <br><br>

    <input type="number" id="horas" placeholder="Horas sozinho por dia" required>
    <br><br>

    <textarea id="motivo" placeholder="Motivo da adoção" required></textarea>
    <br><br>

    <a href="termo.html" target="_blank">Termo de Responsabilidade</a>
    <br>

    <label>
      <input type="checkbox" id="termo" required> Aceito o termo de responsabilidade
    </label>
    <br><br>

    <button type="submit">Enviar</button>

  </form>

  <script src="ong.js"></script>
</body>

</html>
